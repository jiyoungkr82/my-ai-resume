#version: '3.8'

services:
  # 1. 데이터베이스 컨테이너
  db:
    image: mysql:8.0
    container_name: resume-db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: resume_db
    volumes:
      - db_data:/var/lib/mysql

#   2. 백엔드(Spring Boot) 컨테이너
  backend:
    build: ./backend # backend 폴더의 Dockerfile을 읽어서 빌드
    container_name: resume-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/resume_db # 'localhost'가 아닌 서비스명 'db'로 접근!
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      - db # DB가 먼저 뜬 다음에 백엔드가 실행됨

  # 3. 프론트엔드(React) 컨테이너
  frontend:
    build: ./frontend # frontend 폴더의 Dockerfile을 읽어서 빌드
    container_name: resume-web
    ports:
      - "3000:5173"
    stdin_open: true # 리액트 컨테이너가 바로 종료되는 것 방지
    tty: true
    depends_on:
      - backend

volumes:
  db_data:
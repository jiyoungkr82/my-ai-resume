#version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: resume-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: resume_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ${DOCKERHUB_USERNAME}/resume-api:latest # 빌드 대신 이미지 사용
    container_name: resume-api
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/resume_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${DOCKERHUB_USERNAME}/resume-web:latest # 빌드 대신 이미지 사용
    container_name: resume-web
    restart: always
    ports:
      - "80:5173" # 서버에서는 80포트로 접속하면 5173(Vite)으로 연결
    depends_on:
      - backend

volumes:
  db_data:
